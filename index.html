<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BlueMusic Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --blue: #1f3dc9; --bg: #070b1d; --card: #122066; }
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins', sans-serif; }
        body { background: var(--bg); color: white; overflow: hidden; height: 100vh; width: 100vw; }
        
        .container { display: grid; grid-template-columns: 240px 1fr; height: 100vh; }
        .sidebar { background: #0d1b4c; padding: 30px 20px; border-right: 1px solid rgba(255,255,255,0.1); }
        .main { padding: 25px; overflow-y: auto; padding-bottom: 120px; }
        
        /* Search */
        .search-box { position: relative; width: 100%; max-width: 400px; }
        .search-box input { width: 100%; padding: 12px 45px; border-radius: 25px; border: none; background: var(--card); color: white; outline: none; transition: 0.3s; }
        .search-box input:focus { box-shadow: 0 0 0 2px #4da6ff; }
        
        /* Grid Lagu */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; margin-top: 30px; }
        .card { background: var(--card); padding: 15px; border-radius: 15px; cursor: pointer; transition: 0.3s; position: relative; }
        .card:hover { transform: translateY(-5px); background: var(--blue); }
        .card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 10px; margin-bottom: 10px; }
        .card h4 { font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .card.active { border: 2px solid #4da6ff; }

        /* Player Bar */
        .player { position: fixed; bottom: 0; width: 100%; background: #0d1b4c; padding: 15px 30px; display: flex; align-items: center; justify-content: space-between; border-top: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px); }
        .track-info { display: flex; align-items: center; gap: 12px; width: 30%; }
        .track-info img { width: 55px; height: 55px; border-radius: 8px; object-fit: cover; }
        
        .controls { display: flex; flex-direction: column; align-items: center; gap: 8px; width: 40%; }
        .btn-group { display: flex; align-items: center; gap: 25px; }
        .main-btn { width: 45px; height: 45px; border-radius: 50%; background: white; color: black; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 18px; transition: 0.2s; }
        .main-btn:hover { transform: scale(1.1); }
        .nav-btn { background: none; border: none; color: #a0a7c1; font-size: 20px; cursor: pointer; transition: 0.2s; }
        .nav-btn:hover { color: white; }

        @media (max-width: 768px) { .sidebar { display: none; } .container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="container">
    <div class="sidebar">
        <h2 style="color: #4da6ff; margin-bottom: 30px;"><i class="fas fa-headphones"></i> BlueMusic</h2>
        <p style="color: #6a7194; font-size: 12px; text-transform: uppercase; letter-spacing: 1px;">Menu</p>
        <div style="margin-top: 15px; color: white;"><i class="fas fa-house"></i> Home</div>
    </div>

    <div class="main">
        <div class="search-box">
            <i class="fas fa-search" style="position: absolute; left: 18px; top: 14px; color: #6a7194;"></i>
            <input type="text" id="search" placeholder="Cari lagu...">
        </div>
        <div class="grid" id="content"></div>
    </div>
</div>

<div class="player">
    <div class="track-info">
        <img src="https://via.placeholder.com/55" id="pCover">
        <div style="overflow: hidden;">
            <h5 id="pTitle" style="white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">Pilih lagu...</h5>
            <small id="pArtist" style="color: #6a7194;">Artis</small>
        </div>
    </div>

    <div class="controls">
        <div class="btn-group">
            <button class="nav-btn" onclick="prevTrack()"><i class="fas fa-backward-step"></i></button>
            <button class="main-btn" id="playBtn" onclick="togglePlay()"><i class="fas fa-play"></i></button>
            <button class="nav-btn" onclick="nextTrack()"><i class="fas fa-forward-step"></i></button>
        </div>
    </div>

    <div style="width: 30%; text-align: right;"><i class="fas fa-volume-up"></i></div>
</div>

<audio id="audio"></audio>

<script>
    const audio = document.getElementById('audio');
    const playBtn = document.getElementById('playBtn');
    let currentList = [];
    let currentIndex = -1;

    document.getElementById('search').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') searchSongs(e.target.value);
    });

    async function searchSongs(q) {
        const res = await fetch(`/api/search?q=${encodeURIComponent(q)}`);
        currentList = await res.json();
        renderGrid();
    }

    function renderGrid() {
        const grid = document.getElementById('content');
        grid.innerHTML = currentList.map((s, i) => `
            <div class="card ${currentIndex === i ? 'active' : ''}" onclick="playTrack(${i})">
                <img src="${s.cover}">
                <h4>${s.title}</h4>
                <small style="color:#6a7194">${s.artist}</small>
            </div>
        `).join('');
    }

    async function playTrack(index) {
    if (index < 0 || index >= currentList.length) return;
    currentIndex = index;
    const track = currentList[currentIndex];
    
    document.getElementById('pTitle').innerText = track.title;
    document.getElementById('pArtist').innerText = track.artist;
    document.getElementById('pCover').src = track.cover;
    
    try {
        // 1. Ambil URL stream dari backend
        const res = await fetch(`/api/stream?id=${track.id}`);
        const data = await res.json();
        
        if (data.url) {
            // 2. Masukkan URL langsung ke audio player
            audio.src = data.url;
            audio.play();
            playBtn.innerHTML = '<i class="fas fa-pause"></i>';
        } else {
            alert("Gagal mengambil sumber suara.");
        }
    } catch (err) {
        console.error("Error playing track:", err);
        alert("Terjadi kesalahan saat memutar lagu.");
    }
    
    renderGrid();
}


    function togglePlay() {
        if (currentIndex === -1) return;
        if (audio.paused) {
            audio.play();
            playBtn.innerHTML = '<i class="fas fa-pause"></i>';
        } else {
            audio.pause();
            playBtn.innerHTML = '<i class="fas fa-play"></i>';
        }
    }

    function nextTrack() {
        if (currentIndex < currentList.length - 1) playTrack(currentIndex + 1);
        else playTrack(0); // Loop ke awal
    }

    function prevTrack() {
        if (currentIndex > 0) playTrack(currentIndex - 1);
    }

    // Fitur Auto Next
    audio.addEventListener('ended', () => {
        nextTrack();
    });

    // Init pencarian awal
    searchSongs('Lagu hits 2024');
</script>
</body>
</html>
